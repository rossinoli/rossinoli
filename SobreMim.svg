<svg width="100%" height="480" viewBox="0 0 1200 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0e12"/>
      <stop offset="100%" stop-color="#0d0709"/>
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#3a1f27" stroke-width="0.5" opacity="0.35"/>
    </pattern>
  </defs>

  <rect width="1200" height="480" fill="url(#bg)"/>
  <rect width="1200" height="480" fill="url(#grid)"/>
  <rect x="1" y="1" width="1198" height="478" fill="none" stroke="#5c2a35" stroke-width="1" opacity="0.6"/>

  <path d="M 20 40 L 20 20 L 40 20" fill="none" stroke="#a86b78" stroke-width="1.5" opacity="0.7"/>
  <path d="M 1180 440 L 1180 460 L 1160 460" fill="none" stroke="#a86b78" stroke-width="1.5" opacity="0.7"/>

  <text x="60" y="70" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="bold" font-style="italic" fill="#f5eef0">
    Sobre mim
  </text>
  <line x1="60" y1="88" x2="1140" y2="88" stroke="#5c2a35" stroke-width="1" opacity="0.6"/>

  <g font-family="'Courier New', monospace" font-size="19" fill="#e8dde0">
    <text x="60" y="135">
      <tspan>Sou a </tspan><tspan font-weight="bold" fill="#c98fa0">Thaina Rossinoli</tspan><tspan>, desenvolvedora focada em </tspan><tspan font-weight="bold" fill="#c98fa0">Mobile Nativo (Java)</tspan>
    </text>
    <text x="60" y="163">
      <tspan>e </tspan><tspan font-weight="bold" fill="#c98fa0">Front-end</tspan><tspan> — apaixonada pela lógica dos sistemas, do bit ao pixel.</tspan>
    </text>

    <text x="60" y="211">
      <tspan>Atuo unindo desenvolvimento técnico à </tspan><tspan font-weight="bold" fill="#c98fa0">Análise de Requisitos</tspan>
    </text>
    <text x="60" y="239">
      <tspan>e à estruturação de </tspan><tspan font-weight="bold" fill="#c98fa0">Bancos de Dados</tspan><tspan>, com facilidade para transformar</tspan>
    </text>
    <text x="60" y="267">
      <tspan>ideias em soluções sólidas e atenção total aos detalhes.</tspan>
    </text>

    <text x="60" y="315">
      <tspan>No tempo livre, crio games e pixel art no </tspan><tspan font-weight="bold" fill="#c98fa0">Godot</tspan><tspan> e </tspan><tspan font-weight="bold" fill="#c98fa0">Aseprite</tspan>
    </text>
    <text x="60" y="343">
      <tspan>— e consumo animes com a mesma seriedade que refatoro código.</tspan>
    </text>

    <text x="60" y="391" fill="#7fb4b8">
      <tspan>🎯 Buscando oportunidades em </tspan><tspan font-weight="bold" fill="#c98fa0">Mobile</tspan><tspan fill="#7fb4b8">, </tspan><tspan font-weight="bold" fill="#c98fa0">Front-end</tspan>
    </text>
    <text x="60" y="419" fill="#7fb4b8">
      <tspan>ou </tspan><tspan font-weight="bold" fill="#c98fa0">Análise de Requisitos</tspan><tspan fill="#7fb4b8">, em regime </tspan><tspan font-weight="bold" fill="#c98fa0">CLT</tspan><tspan fill="#7fb4b8"> ou </tspan><tspan font-weight="bold" fill="#c98fa0">freelance</tspan><tspan fill="#7fb4b8">.</tspan>
    </text>
  </g>
</svg>
